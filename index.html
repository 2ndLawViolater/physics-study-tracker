<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 0 — Math Foundation & Intro Physics</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede8;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #9a9a96;
    --border: rgba(0,0,0,0.12);
    --border-mid: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --blue-bar: #378ADD;
    --green-bg: #EAF3DE;
    --green-text: #27500A;
    --green-bar: #639922;
    --purple-bg: #EEEDFE;
    --purple-text: #3C3489;
    --amber-bg: #FAEEDA;
    --amber-text: #633806;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text-primary: #f0efe8;
      --text-secondary: #9a9a96;
      --text-tertiary: #6b6b67;
      --border: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.2);
      --blue-bg: #042C53;
      --blue-text: #B5D4F4;
      --green-bg: #173404;
      --green-text: #C0DD97;
      --purple-bg: #26215C;
      --purple-text: #CECBF6;
      --amber-bg: #412402;
      --amber-text: #FAC775;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 780px; margin: 0 auto; }

  .top-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 6px;
  }
  .top-title { font-size: 20px; font-weight: 500; color: var(--text-primary); }
  .top-sub { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }

  .reset-btn {
    font-size: 12px; padding: 6px 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-mid);
    background: transparent; color: var(--text-secondary);
    cursor: pointer; font-family: var(--font);
  }
  .reset-btn:hover { background: var(--bg-secondary); }

  .overall-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text-secondary);
    margin: 12px 0 5px;
  }
  .overall-track {
    width: 100%; height: 6px;
    background: var(--border); border-radius: 3px;
    margin-bottom: 16px; overflow: hidden;
  }
  .overall-fill {
    height: 6px; border-radius: 3px;
    background: var(--blue-bar); transition: width 0.3s;
  }

  .metrics {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px; margin-bottom: 1.5rem;
  }
  .metric {
    background: var(--bg-secondary);
    border-radius: var(--radius-md); padding: 10px 12px;
  }
  .metric-val { font-size: 20px; font-weight: 500; color: var(--text-primary); }
  .metric-lbl { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  .block-header {
    display: flex; align-items: center;
    gap: 8px; margin: 1.25rem 0 6px;
  }
  .block-label {
    font-size: 11px; font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .block-tag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 4px; font-weight: 500;
  }
  .b1-tag { background: var(--blue-bg); color: var(--blue-text); }
  .b2-tag { background: var(--green-bg); color: var(--green-text); }
  .b3-tag { background: var(--purple-bg); color: var(--purple-text); }

  .week-card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 8px; overflow: hidden;
  }
  .week-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; cursor: pointer; user-select: none;
  }
  .week-row:hover { background: var(--bg-secondary); }

  .week-badge {
    font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 5px; white-space: nowrap;
  }
  .w-blue { background: var(--blue-bg); color: var(--blue-text); }
  .w-green { background: var(--green-bg); color: var(--green-text); }
  .w-purple { background: var(--purple-bg); color: var(--purple-text); }

  .week-title { font-size: 13px; font-weight: 500; color: var(--text-primary); flex: 1; }
  .week-pct { font-size: 12px; color: var(--text-secondary); margin-right: 4px; }
  .week-bar-wrap { width: 80px; }
  .week-bar-track {
    height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .week-bar-fill { height: 4px; border-radius: 2px; transition: width 0.3s; }
  .chevron { font-size: 11px; color: var(--text-tertiary); }

  .week-body {
    display: none; padding: 0 16px 16px;
    border-top: 0.5px solid var(--border);
  }
  .week-body.open { display: block; }

  .two-col {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 14px;
  }
  @media (max-width: 560px) { .two-col { grid-template-columns: 1fr; } }

  .inner-box {
    background: var(--bg-secondary);
    border-radius: var(--radius-md); padding: 10px 12px;
  }
  .inner-label {
    font-size: 10px; font-weight: 500;
    color: var(--text-tertiary);
    letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 8px;
  }

  .task-row {
    display: flex; align-items: flex-start;
    gap: 8px; margin-bottom: 6px;
  }
  .task-row input[type=checkbox] { margin-top: 2px; flex-shrink: 0; cursor: pointer; }
  .task-text { font-size: 12px; color: var(--text-primary); line-height: 1.5; cursor: pointer; }
  .task-text.done { text-decoration: line-through; color: var(--text-tertiary); }
  .sub-item {
    font-size: 11px; color: var(--text-secondary);
    margin-left: 20px; margin-bottom: 3px; line-height: 1.4;
  }

  .conn-box {
    margin-top: 12px;
    border-left: 3px solid var(--blue-bar);
    padding: 8px 12px;
    background: var(--bg-secondary);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
  }
  .conn-label {
    font-size: 10px; font-weight: 500; color: var(--blue-text);
    letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 4px;
  }
  .conn-text { font-size: 12px; color: var(--text-primary); line-height: 1.55; }

  .checkpoint-box {
    margin-top: 10px;
    border-left: 3px solid var(--green-bar);
    padding: 8px 12px;
    background: var(--bg-secondary);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
  }
  .checkpoint-label {
    font-size: 10px; font-weight: 500; color: var(--green-text);
    letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 4px;
  }
  .checkpoint-text { font-size: 12px; color: var(--text-primary); line-height: 1.55; }

  .notes-label {
    font-size: 11px; color: var(--text-secondary);
    margin-top: 12px; margin-bottom: 4px;
  }
  textarea {
    width: 100%; min-height: 64px;
    font-size: 12px; font-family: var(--font);
    color: var(--text-primary);
    background: var(--bg);
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md);
    padding: 8px 10px; resize: vertical; line-height: 1.5;
  }
  textarea::placeholder { color: var(--text-tertiary); }
  textarea:focus { outline: none; border-color: var(--blue-bar); }

  .footer {
    text-align: center; margin-top: 2rem;
    font-size: 12px; color: var(--text-tertiary);
  }
</style>
</head>
<body>
<div class="container">

  <div class="top-header">
    <div>
      <div class="top-title">Phase 0 — math foundation &amp; intro physics</div>
      <div class="top-sub" id="progress-status">Loading progress...</div>
    </div>
    <button class="reset-btn" onclick="resetAll()">Reset all</button>
  </div>

  <div class="overall-label">
    <span>Overall progress</span>
    <span id="overall-pct">0%</span>
  </div>
  <div class="overall-track">
    <div class="overall-fill" id="overall-bar" style="width:0%"></div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-val" id="m-weeks">0/12</div><div class="metric-lbl">Weeks complete</div></div>
    <div class="metric"><div class="metric-val" id="m-tasks">0</div><div class="metric-lbl">Tasks done</div></div>
    <div class="metric"><div class="metric-val" id="m-total">—</div><div class="metric-lbl">Total tasks</div></div>
    <div class="metric"><div class="metric-val" id="m-block">Block 1, wk 1</div><div class="metric-lbl">Current block</div></div>
  </div>

  <div id="weeks-container"></div>

  <div class="footer">Progress saves automatically to your browser &nbsp;·&nbsp; University Physics with Modern Physics (your edition)</div>

</div>

    physics:[
      {id:'w12p1', text:'Ch 27: Magnetic Field and Magnetic Forces', subs:['#27.1–27.25 (magnetic force on charges & wires)','#27.26–27.40 (Hall effect, charged particle motion)']},
      {id:'w12p2', text:'Phase 0 comprehensive review: pick 5 problems from each block', subs:[]},
    ],
    connection:'Eigenvectors will feel abstract now — that\'s normal. Their physical meaning snaps into focus in QM: observable quantities are eigenvalues of operators, and quantum states are eigenvectors. Plant the seed here.',
    checkpoint:'End-of-phase 0 check — before starting Phase 1: Can you: (1) compute div and curl of a 3D vector field? (2) Evaluate a triple integral in spherical coordinates? (3) Solve a 2nd order ODE with initial conditions? (4) Find eigenvalues of a 2×2 matrix? (5) Apply Gauss\'s law (Ch 22) to find E for a spherical charge distribution? If you can do all five, you\'re ready for Phase 1.'
  }
];

const STORAGE_KEY = 'phase0-tracker-v1';
let state = {};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) { state = {}; }
  document.getElementById('progress-status').textContent = 'Progress loaded';
  render();
  updateMetrics();
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  document.getElementById('progress-status').textContent = 'Progress saved \u2713';
  setTimeout(() => {
    const el = document.getElementById('progress-status');
    if (el) el.textContent = 'Progress saves automatically';
  }, 2000);
}

function allTaskIds() {
  let ids = [];
  WEEKS.forEach(w => {
    w.math.forEach(t => ids.push(t.id));
    w.physics.forEach(t => ids.push(t.id));
  });
  return ids;
}

function countDone() { return allTaskIds().filter(id => state[id + '_done']).length; }

function weekPct(w) {
  const ids = [...w.math.map(t => t.id), ...w.physics.map(t => t.id)];
  if (!ids.length) return 0;
  return Math.round(ids.filter(id => state[id + '_done']).length / ids.length * 100);
}

function updateMetrics() {
  const total = allTaskIds().length;
  const done = countDone();
  const pct = Math.round(done / total * 100);
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('m-tasks').textContent = done;
  document.getElementById('m-total').textContent = total;
  const weeksComplete = WEEKS.filter(w => weekPct(w) === 100).length;
  document.getElementById('m-weeks').textContent = weeksComplete + '/12';
  const cur = WEEKS.find(w => weekPct(w) < 100) || WEEKS[WEEKS.length - 1];
  document.getElementById('m-block').textContent = 'Block ' + cur.block + ', wk ' + (WEEKS.indexOf(cur) + 1);
  WEEKS.forEach(w => {
    const p = weekPct(w);
    const pEl = document.getElementById('pct-' + w.id);
    const bEl = document.getElementById('bar-' + w.id);
    if (pEl) pEl.textContent = p + '%';
    if (bEl) { bEl.style.width = p + '%'; bEl.style.background = p === 100 ? '#639922' : '#378ADD'; }
  });
}

function toggleWeek(wid) {
  const body = document.getElementById('body-' + wid);
  const chev = document.getElementById('chev-' + wid);
  const open = body.classList.toggle('open');
  chev.textContent = open ? '▼' : '▶';
}

function checkTask(id, el) {
  state[id + '_done'] = el.checked;
  const lbl = document.getElementById('label-' + id);
  if (lbl) lbl.classList.toggle('done', el.checked);
  saveState(); updateMetrics();
}

function saveNote(wid, val) { state['note-' + wid] = val; saveState(); }

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  state = {}; saveState(); render(); updateMetrics();
}

function render() {
  const container = document.getElementById('weeks-container');
  let html = '';
  let curBlock = 0;
  const bNames = {1:'Calc 1 & intro kinematics', 2:'Calc 2, ODEs & Newtonian mechanics', 3:'Calc 3, vector calc & electrostatics'};
  const bWks = {1:'1–4', 2:'5–8', 3:'9–12'};
  const bTag = {1:'b1-tag', 2:'b2-tag', 3:'b3-tag'};

  WEEKS.forEach(w => {
    if (w.block !== curBlock) {
      curBlock = w.block;
      html += `<div class="block-header"><span class="block-label">Block ${curBlock} — weeks ${bWks[curBlock]}</span><span class="badge block-tag ${bTag[curBlock]}">${bNames[curBlock]}</span></div>`;
    }
    const pct = weekPct(w);
    const noteVal = (state['note-' + w.id] || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');

    let mathHtml = '';
    w.math.forEach(t => {
      const chk = state[t.id + '_done'] ? 'checked' : '';
      const dc = state[t.id + '_done'] ? 'done' : '';
      mathHtml += `<div class="task-row"><input type="checkbox" id="cb-${t.id}" ${chk} onchange="checkTask('${t.id}',this)"><label id="label-${t.id}" class="task-text ${dc}" for="cb-${t.id}">${t.text}</label></div>`;
      t.subs.forEach(s => { mathHtml += `<div class="sub-item">→ ${s}</div>`; });
    });

    let physHtml = '';
    w.physics.forEach(t => {
      const chk = state[t.id + '_done'] ? 'checked' : '';
      const dc = state[t.id + '_done'] ? 'done' : '';
      physHtml += `<div class="task-row"><input type="checkbox" id="cb-${t.id}" ${chk} onchange="checkTask('${t.id}',this)"><label id="label-${t.id}" class="task-text ${dc}" for="cb-${t.id}">${t.text}</label></div>`;
      t.subs.forEach(s => { physHtml += `<div class="sub-item">→ ${s}</div>`; });
    });

    const cpHtml = w.checkpoint ? `<div class="checkpoint-box"><div class="checkpoint-label">${w.id === 'w12' ? 'End-of-phase 0 check' : 'Block checkpoint'}</div><div class="checkpoint-text">${w.checkpoint}</div></div>` : '';

    html += `<div class="week-card">
      <div class="week-row" onclick="toggleWeek('${w.id}')">
        <span class="week-badge ${w.badge}">${w.label}</span>
        <span class="week-title">${w.title}</span>
        <span class="week-pct" id="pct-${w.id}">${pct}%</span>
        <div class="week-bar-wrap"><div class="week-bar-track"><div class="week-bar-fill" id="bar-${w.id}" style="width:${pct}%;background:${pct===100?'#639922':'#378ADD'}"></div></div></div>
        <span class="chevron" id="chev-${w.id}">▶</span>
      </div>
      <div class="week-body" id="body-${w.id}">
        <div class="two-col">
          <div class="inner-box"><div class="inner-label">Math — 5 hrs</div>${mathHtml}</div>
          <div class="inner-box"><div class="inner-label">Physics — 6 hrs</div>${physHtml}</div>
        </div>
        <div class="conn-box"><div class="conn-label">Connection to make this week</div><div class="conn-text">${w.connection}</div></div>
        ${cpHtml}
        <div class="notes-label">Notes</div>
        <textarea placeholder="Add notes, things to revisit, questions..." oninput="saveNote('${w.id}',this.value)">${noteVal}</textarea>
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

loadState();
</script>
</body>
</html>
